# ICHIMOKU bot — 1 portfolio (MNT+DOT pe acelasi subaccount Bybit).
# Single-stack deploy. Pentru Portainer foloseste acest fisier ca stack content.

services:
  ichimoku:
    image: sdancri/ichimoku:latest
    pull_policy: always
    container_name: ichimoku
    restart: unless-stopped
    environment:
      - TZ=Europe/Bucharest
      - BOT_NAME=ichimoku_mnt_dot
      - CHART_PORT=8103
      - TRADING_MODE=${TRADING_MODE:-live}
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    ports:
      - "8103:8103"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8103/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
