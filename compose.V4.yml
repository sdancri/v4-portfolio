# V4 portfolio bot — multi-strategy (BB MR + Hull+Ichimoku, 4h)
#
# Perechi (3, shared equity pool, compound):
#   BTCUSDT  — strategy: bb_mr  (Bollinger Bands Mean Reversion)
#   TIAUSDT  — strategy: hi     (Hull MA + Ichimoku Cloud, trend follow)
#   NEARUSDT — strategy: hi     (Hull MA + Ichimoku Cloud, trend follow)
#
# Host port 8107 → container 8104 (8104-8106 ocupate pe VPS).
# Subaccount Bybit: V4 (separate API key).
# Reset profit MANUAL la $5K (user marcheaza profitul + reset).

services:
  V4:
    image: sdancri/v4_portfolio:latest
    pull_policy: always
    container_name: V4
    restart: unless-stopped
    environment:
      - CONFIG_FILE=config/config_v4.yaml
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
      - BYBIT_TESTNET=${BYBIT_TESTNET:-0}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TZ=Europe/Bucharest
      - CHART_TZ=${CHART_TZ:-Europe/Bucharest}
      - BOT_NAME=V4
      - STRATEGY_NAME=BB-MR + Hull+Ichimoku
      - CHART_PORT=8104          # port intern container (FastAPI listen)
      - CHART_HOST_PORT=8107     # port host (afisat in Telegram, link chart)
      - DATA_DIR=/app/data
      - RESET_TOKEN=${RESET_TOKEN:-}
      - RATE_LIMIT_PER_SEC=${RATE_LIMIT_PER_SEC:-5}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-10}
    ports:
      - "8107:8104"
    volumes:
      - ./logs/V4:/app/logs
      - ./data/V4:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8104/api/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    # VPS resource hygiene
    mem_limit: 512m              # cap defensiv (V4 tipic 150-300MB)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"          # 10MB per fisier log
        max-file: "3"            # max 30MB total (rotation 3×)
