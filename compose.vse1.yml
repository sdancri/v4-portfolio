# Stack Portainer pentru VSE_1 (subacc 1: KAIA + AAVE 1H)
# Restart / redeploy NU afectează VSE_2 (e în stack separat).

services:
  VSE_1:
    image: sdancri/vse:latest
    pull_policy: always
    container_name: VSE_1
    restart: unless-stopped
    environment:
      - TZ=Europe/Bucharest
      - SUBACCOUNT_NAME=subacc_1_kaia_aave
      - BOT_NAME=VSE_1
      - CHART_PORT=8101
      - TRADING_MODE=${TRADING_MODE:-testnet}
      - SUB1_API_KEY=${SUB1_API_KEY}
      - SUB1_API_SECRET=${SUB1_API_SECRET}
      - SUB2_API_KEY=${SUB2_API_KEY}
      - SUB2_API_SECRET=${SUB2_API_SECRET}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    ports:
      - "8101:8101"
    volumes:
      - ./logs/sub1:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8101/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
