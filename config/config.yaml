# ICHIMOKU bot — config validat (Hull+Ichimoku 4h, MNT+DOT, OOS-tested)

portfolio:
  name: ichimoku_mnt_dot
  pool_total: 100.0           # capital initial USDT (compound de aici)
  leverage: 15                # default Bybit isolated (fallback daca pereche n-are override)
  cap_pct_of_max: 0.95
  taker_fee: 0.00055          # 0.055% taker
  slippage_bps: 0.0

pairs:
  # MNTUSDT — best pair (PF 1.83 standalone, OOS validated)
  - symbol: MNTUSDT
    timeframe: 4h
    enabled: true
    leverage: 20              # MNT-specific leverage (notional 2.33× equity la risc 7%/SL 3%)
    hull_length: 8            # OOS-tunat (vs 10 din sweep full-data)
    tenkan_periods: 9
    kijun_periods: 48
    senkou_b_periods: 40
    displacement: 24
    risk_pct_per_trade: 0.07  # 7% din shared equity
    sl_initial_pct: 0.03      # SL 3% — Aggressive (MNT signal-quality permite SL strans)
    tp_pct: null              # NO TP — signal exit only (let trends run)
    max_hull_spread_pct: 2.0
    max_close_kijun_dist_pct: 6.0

  # DOTUSDT — robust contributor (PF 1.34 OOS, validated 4 ani)
  - symbol: DOTUSDT
    timeframe: 4h
    enabled: true
    leverage: 7               # DOT-specific (notional 0.625× equity la risc 5%/SL 8%)
    hull_length: 10
    tenkan_periods: 9
    kijun_periods: 36         # diferit fata de MNT (tunat per pair)
    senkou_b_periods: 52
    displacement: 24
    risk_pct_per_trade: 0.05  # 5% din shared equity
    sl_initial_pct: 0.08      # SL 8% — DOT noisier, evita false-out
    tp_pct: 0.12              # TP 12% (asymmetric per pair, lock in earlier)
    max_hull_spread_pct: 2.0
    max_close_kijun_dist_pct: 6.0

operational:
  max_concurrent_positions: 2
  max_consecutive_api_errors: 5
  heartbeat_interval_seconds: 60
  save_state_interval_seconds: 300
  state_dir: ./state
  log_dir: ./logs
