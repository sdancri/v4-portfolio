# Stack Portainer pentru VSE_2 (subacc 2: ONT 1H + ETH 2H)
# Restart / redeploy NU afectează VSE_1 (e în stack separat).

services:
  VSE_2:
    image: sdancri/vse:latest
    pull_policy: always
    container_name: VSE_2
    restart: unless-stopped
    environment:
      - TZ=Europe/Bucharest
      - SUBACCOUNT_NAME=subacc_2_ont_eth
      - BOT_NAME=VSE_2
      - CHART_PORT=8102
      - TRADING_MODE=${TRADING_MODE:-live}
      - SUB1_API_KEY=${SUB1_API_KEY}
      - SUB1_API_SECRET=${SUB1_API_SECRET}
      - SUB2_API_KEY=${SUB2_API_KEY}
      - SUB2_API_SECRET=${SUB2_API_SECRET}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    ports:
      - "8102:8102"
    volumes:
      - ./logs/sub2:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8102/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
